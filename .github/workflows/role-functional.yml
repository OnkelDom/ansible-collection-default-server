---
name: Role Functional Tests

on:
  push:
    branches:
    - main
    - master
    paths:
    - 'roles/**'
    - 'tests/**'
    - 'tools/**'
    - '.github/workflows/**'
    - 'requirements*.txt'
    - 'requirements.yml'
    - 'galaxy.yml'
    - '.ansible-lint*'
  pull_request:
    paths:
    - 'roles/**'
    - 'tests/**'
    - 'tools/**'
    - '.github/workflows/**'
    - 'requirements*.txt'
    - 'requirements.yml'
    - 'galaxy.yml'
    - '.ansible-lint*'
  workflow_dispatch:
    inputs:
      role:
        description: Optional role name to test, for example dante or wpad
        required: false
        type: string

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      count: ${{ steps.matrix.outputs.count }}

    steps:
    - name: Check out repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install matrix helper dependency
      run: python -m pip install PyYAML

    - name: Collect changed files
      id: changed-files
      env:
        EVENT_NAME: ${{ github.event_name }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
        PUSH_BEFORE_SHA: ${{ github.event.before || '' }}
      run: |
        if [ -n "${{ github.event.inputs.role || '' }}" ]; then
          : > changed-files.txt
        elif [ "${EVENT_NAME}" = "pull_request" ] && [ -n "${PR_BASE_SHA}" ]; then
          git diff --name-only "${PR_BASE_SHA}"...HEAD > changed-files.txt
        elif [ -n "${PUSH_BEFORE_SHA}" ] && [ "${PUSH_BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]; then
          git diff --name-only "${PUSH_BEFORE_SHA}" HEAD > changed-files.txt
        else
          git ls-files > changed-files.txt
        fi

        {
          echo 'changed_files<<EOF'
          cat changed-files.txt
          echo EOF
        } >> "${GITHUB_OUTPUT}"

    - name: Build functional role matrix
      id: matrix
      env:
        ROLE_FILTER: ${{ github.event.inputs.role || '' }}
        CHANGED_FILES: ${{ steps.changed-files.outputs.changed_files }}
      run: |
        python tests/build_role_functional_matrix.py > functional-matrix.json
        echo "matrix=$(python -c 'import json; print(json.dumps(json.load(open(\"functional-matrix.json\"))))')" >> "${GITHUB_OUTPUT}"
        echo "count=$(python -c 'import json; print(len(json.load(open(\"functional-matrix.json\"))[\"include\"]))')" >> "${GITHUB_OUTPUT}"

  test:
    name: ${{ matrix.role_name }} on ${{ matrix.os_name }}
    needs: discover
    if: ${{ needs.discover.outputs.count != '0' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Run functional test for role
      run: bash tests/run_role_functional_checks.sh "${{ matrix.role_name }}" "${{ matrix.image }}"
