---
name: CI

on:
  push:
    branches:
    - main
    - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements-test.txt

    - name: Install collection dependencies
      run: ansible-galaxy collection install -r requirements.yml

    - name: Build and install collection artifact
      run: |
        ansible-galaxy collection build --force
        ansible-galaxy collection install lenmail-default_server-*.tar.gz --force

    - name: Verify generated role scaffolding
      run: python tools/generate_role_scaffold.py --check

    - name: Run unit tests
      run: pytest -q tests/unit

    - name: Run ansible-lint
      run: ansible-lint

    - name: Prepare ansible-test workspace
      run: |
        mkdir -p "${RUNNER_TEMP}/ansible_collections/lenmail"
        ln -s "${GITHUB_WORKSPACE}" "${RUNNER_TEMP}/ansible_collections/lenmail/default_server"

    - name: Run ansible-test sanity
      run: |
        cd "${RUNNER_TEMP}/ansible_collections/lenmail/default_server"
        ansible-test sanity --python 3.12

    - name: Run syntax checks for all roles
      env:
        ANSIBLE_FORCE_COLOR: "1"
      run: bash tests/run_role_syntax_checks.sh

  integration-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
        - os_name: ubuntu-22.04
          image: ubuntu:22.04
        - os_name: debian-12
          image: debian:12
        - os_name: rocky-9
          image: rockylinux:9

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Run smoke integration test in container
      env:
        SMOKE_CONTAINER_IMAGE: ${{ matrix.image }}
        SMOKE_CONTAINER_NAME: lenmail-smoke-${{ github.run_id }}-${{ matrix.os_name }}
      run: bash tests/run_container_integration_smoke.sh
