---
- name: Validate supported platform
  ansible.builtin.assert:
    that:
    - ansible_os_family in ["Debian", "RedHat"]
    fail_msg: "The sftp_server role supports Debian and RedHat families only."
  tags: sftp_server

- name: Include OS-specific variables
  ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"
  tags: sftp_server

- name: Install OpenSSH server package
  ansible.builtin.package:
    name: "{{ sftp_server_package_name }}"
    state: present
  become: true
  tags: sftp_server

- name: Ensure SFTP group exists
  ansible.builtin.group:
    name: "{{ sftp_server_group }}"
    state: present
  become: true
  tags: sftp_server

- name: Ensure base directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
  - "{{ sftp_server_base_path }}"
  - "{{ sftp_server_home_base }}"
  become: true
  tags: sftp_server

- name: Ensure sshd include directory exists
  ansible.builtin.file:
    path: "{{ sftp_server_sshd_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  when: sftp_server_manage_sshd | bool
  tags: sftp_server

- name: Deploy sshd SFTP match configuration
  ansible.builtin.template:
    src: sftp-match.conf.j2
    dest: "{{ sftp_server_sshd_match_config_path }}"
    owner: root
    group: root
    mode: "0644"
  become: true
  when: sftp_server_manage_sshd | bool
  notify: Restart sftp ssh service
  tags: sftp_server

- name: Manage SFTP users
  ansible.builtin.include_tasks: manage_user.yml
  loop: "{{ sftp_server_users }}"
  loop_control:
    loop_var: sftp_server_user
    label: "{{ sftp_server_user.name }}"
  when: (sftp_server_user.state | default('present')) != 'absent'
  tags: sftp_server

- name: Remove absent SFTP users
  ansible.builtin.include_tasks: remove_user.yml
  loop: "{{ sftp_server_users }}"
  loop_control:
    loop_var: sftp_server_user
    label: "{{ sftp_server_user.name }}"
  when: (sftp_server_user.state | default('present')) == 'absent'
  tags: sftp_server

- name: Ensure SSH service is enabled
  ansible.builtin.service:
    name: "{{ sftp_server_service_name }}"
    enabled: true
    state: started
  become: true
  tags: sftp_server
