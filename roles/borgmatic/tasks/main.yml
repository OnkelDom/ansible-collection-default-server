---
- name: Validate supported platform
  ansible.builtin.assert:
    that:
    - ansible_os_family in ["Debian", "RedHat"]
    - borgmatic_install_method == "uv"
    - (ansible_os_family == "Debian" and ((ansible_distribution == "Ubuntu" and ansible_distribution_major_version | int >= 22) or (ansible_distribution == "Debian" and ansible_distribution_major_version | int >= 12))) or (ansible_os_family == "RedHat" and ansible_distribution_major_version | int >= 9)
    fail_msg: "The borgmatic role supports Ubuntu 22.04+, Debian 12+, and RedHat-family 9+ systems only."
  tags: borgmatic

- name: Gather operating system variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
  - "{{ ansible_distribution | lower }}-{{ ansible_distribution_version | lower }}.yml"
  - "{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version | lower }}.yml"
  - "{{ ansible_distribution | lower }}.yml"
  - "{{ ansible_os_family | lower }}-{{ ansible_distribution_major_version | lower }}.yml"
  - "{{ ansible_os_family | lower }}.yml"
  - main.yml
  tags: borgmatic

- name: Install borgmatic base packages
  ansible.builtin.package:
    name: "{{ borgmatic_package_names }}"
    state: "{{ borgmatic_package_state }}"
  when: borgmatic_manage_packages | bool
  become: true
  tags: borgmatic

- name: Ensure uv cache and tool directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
  - "{{ borgmatic_uv_tool_dir }}"
  - "{{ borgmatic_uv_cache_dir }}"
  when: borgmatic_install_method == "uv"
  become: true
  tags: borgmatic

- name: Check for uv binary
  ansible.builtin.stat:
    path: "{{ borgmatic_uv_binary_path }}"
  register: __borgmatic_uv_binary
  when: borgmatic_install_method == "uv"
  tags: borgmatic

- name: Download uv installer
  ansible.builtin.get_url:
    url: "{{ borgmatic_uv_installer_url }}"
    dest: /tmp/borgmatic-uv-installer.sh
    owner: root
    group: root
    mode: "0755"
  when:
  - borgmatic_install_method == "uv"
  - not __borgmatic_uv_binary.stat.exists
  become: true
  tags: borgmatic

- name: Install uv
  ansible.builtin.command:
    cmd: /bin/sh /tmp/borgmatic-uv-installer.sh
  environment:
    UV_UNMANAGED_INSTALL: "{{ borgmatic_uv_install_dir }}"
  when:
  - borgmatic_install_method == "uv"
  - not __borgmatic_uv_binary.stat.exists
  become: true
  tags: borgmatic

- name: Check installed borgmatic version
  ansible.builtin.command:
    cmd: "{{ borgmatic_binary_path }} --version"
  register: __borgmatic_installed_version
  changed_when: false
  failed_when: false
  tags: borgmatic

- name: Install borgmatic with uv
  ansible.builtin.command:
    cmd: >-
      {{ borgmatic_uv_binary_path }}
      tool
      install
      --python
      {{ borgmatic_python_interpreter }}
      borgmatic=={{ borgmatic_version }}
  environment:
    UV_TOOL_BIN_DIR: "{{ borgmatic_uv_tool_bin_dir }}"
    UV_TOOL_DIR: "{{ borgmatic_uv_tool_dir }}"
    UV_CACHE_DIR: "{{ borgmatic_uv_cache_dir }}"
  when:
  - borgmatic_install_method == "uv"
  - __borgmatic_installed_version.rc != 0 or __borgmatic_installed_version.stdout != "borgmatic {{ borgmatic_version }}"
  become: true
  tags: borgmatic

- name: Ensure borgmatic configuration directory exists
  ansible.builtin.file:
    path: "{{ borgmatic_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"
  become: true
  tags: borgmatic

- name: Deploy borgmatic environment file
  ansible.builtin.template:
    src: borgmatic.env.j2
    dest: "{{ borgmatic_environment_file }}"
    owner: root
    group: root
    mode: "0600"
  notify: Restart borgmatic timer
  become: true
  tags: borgmatic

- name: Deploy borgmatic configuration
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ borgmatic_config_file }}"
    owner: root
    group: root
    mode: "0600"
    validate: >-
      {{ borgmatic_binary_path }} --no-environment-interpolation --config %s config validate
  notify: Restart borgmatic timer
  become: true
  tags: borgmatic

- name: Derive local borgmatic repositories
  ansible.builtin.set_fact:
    borgmatic_local_repositories: >-
      {{
        borgmatic_config.repositories
        | default([])
        | selectattr('path', 'defined')
        | selectattr('path', 'match', '^/')
        | list
      }}
  when: borgmatic_manage_local_repositories | bool
  tags: borgmatic

- name: Ensure parent directories for local repositories exist
  ansible.builtin.file:
    path: "{{ item.path | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ borgmatic_local_repositories | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  when: borgmatic_manage_local_repositories | bool
  become: true
  tags: borgmatic

- name: Create local borgmatic repositories
  ansible.builtin.command:
    cmd: >-
      {{ borgmatic_binary_path }}
      --config
      {{ borgmatic_config_file }}
      repo-create
      --repository
      {{ item.path }}
      --encryption
      {{ item.encryption | default(borgmatic_repository_default_encryption) }}
  args:
    creates: "{{ item.path }}/config"
  environment: "{{ borgmatic_environment }}"
  loop: "{{ borgmatic_local_repositories | default([]) }}"
  loop_control:
    label: "{{ item.path }}"
  when: borgmatic_manage_local_repositories | bool
  become: true
  tags: borgmatic

- name: Deploy borgmatic systemd service unit
  ansible.builtin.template:
    src: borgmatic.service.j2
    dest: "/etc/systemd/system/{{ borgmatic_service_unit_name }}"
    owner: root
    group: root
    mode: "0644"
  notify:
  - Reload borgmatic systemd
  - Restart borgmatic timer
  become: true
  tags: borgmatic

- name: Deploy borgmatic systemd timer unit
  ansible.builtin.template:
    src: borgmatic.timer.j2
    dest: "/etc/systemd/system/{{ borgmatic_timer_unit_name }}"
    owner: root
    group: root
    mode: "0644"
  notify:
  - Reload borgmatic systemd
  - Restart borgmatic timer
  become: true
  tags: borgmatic

- name: Manage borgmatic timer
  ansible.builtin.systemd:
    name: "{{ borgmatic_timer_unit_name }}"
    enabled: "{{ borgmatic_timer_enabled }}"
    state: "{{ borgmatic_timer_state if borgmatic_timer_enabled else 'stopped' }}"
    daemon_reload: true
  when: borgmatic_manage_timer | bool
  become: true
  tags: borgmatic
