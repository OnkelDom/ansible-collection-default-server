---
- name: "Combine users"
  ansible.builtin.set_fact:
    users_list: >-
      {{
        (users_defaults | default([])) +
        (users_group_vars | default([])) +
        (users_host_vars | default([])) +
        (users_playbook | default([]))
      | unique
      }}
  tags: users

- name: Install package sudo
  ansible.builtin.package:
    name: sudo
    state: present
  become: true
  tags: users

- name: Remove old homes
  ansible.builtin.file:
    path: '/home/{{ user_item.name }}'
    state: absent
  loop: "{{ users_list }}"
  loop_control:
    loop_var: user_item
  when:
  - users_list is defined
  - users_list | length > 0
  - user_item.state is defined
  - user_item.state == 'absent'
  become: true
  tags: users

- name: Manage users
  ansible.builtin.user:
    name: "{{ user_item.name }}"
    comment: "{{ user_item.fullname | default(omit) }}"
    shell: "{{ user_item.shell | default('/bin/bash') }}"
    append: true
    create_home: true
    state: "{{ user_item.state | default('present') }}"
    system: "{{ user_item.system_account | default(false) }}"
    password: "{{ user_item.password | default(omit) if user_item.password is defined else omit }}"
    update_password: on_create
    remove: "{{ user_item.state | default('present') == 'absent' }}"
  loop: "{{ users_list }}"
  loop_control:
    loop_var: user_item
  when:
  - users_list is defined
  - users_list | length > 0
  - user_item.name is defined
  - user_item.name is match("^[a-z_][a-z0-9_-]*[$]?$")
  become: true
  tags: users

- name: Manage authorized keys
  ansible.posix.authorized_key:
    user: "{{ auth_key_item.0.name }}"
    key: "{{ auth_key_item.1 }}"
  loop: "{{ users_list | subelements('authorized_keys', skip_missing=True) }}"
  loop_control:
    loop_var: auth_key_item
  when:
  - users_list is defined
  - users_list | length > 0
  - auth_key_item.1 is defined
  - auth_key_item.1 | length > 0
  - auth_key_item.0.state | default('present') == 'present'
  become: true
  tags: users

- name: Manage sudoer files
  ansible.builtin.lineinfile:
    path: "/etc/sudoers.d/user_{{ sudo_item.name }}"
    line: "{{ sudo_item.name }} {{ sudo_item.cmd | default('ALL=(ALL) NOEXEC: /bin/false') }}"
    state: "{{ (sudo_item.state | default('present') == 'present' and sudo_item.sudo | default(false)) | ternary('present', 'absent') }}"
    mode: "0440"
    create: "{{ sudo_item.state | default('present') == 'present' and sudo_item.sudo | default(false) }}"
    validate: 'visudo -cf %s'
  loop: "{{ users_list }}"
  loop_control:
    loop_var: sudo_item
  when:
  - users_list is defined
  - users_list | length > 0
  - sudo_item.name is defined
  become: true
  tags: users

- name: Manage bash_files
  ansible.builtin.copy:
    src: "{{ bash_file_item.1.name }}"
    dest: "/home/{{ bash_file_item.0.name }}/.{{ bash_file_item.1.name | basename }}"
    owner: "{{ bash_file_item.0.name }}"
    group: "{{ bash_file_item.0.name }}"
    mode: "{{ bash_file_item.1.mode }}"
  loop: "{{ users_list | subelements('bash_files', skip_missing=True) }}"
  loop_control:
    loop_var: bash_file_item
    label: "{{ bash_file_item.0.name }} -> {{ bash_file_item.1.name }}"
  when:
  - users_list is defined
  - users_list | length > 0
  - bash_file_item.0.state | default('present') == 'present'
  become: true
  tags: users

- name: Check user bashrc for legacy powerline-go blocks
  ansible.builtin.stat:
    path: "/home/{{ bashrc_stat_user.name }}/.bashrc"
  loop: "{{ users_list }}"
  loop_control:
    loop_var: bashrc_stat_user
  when:
  - users_list is defined
  - users_list | length > 0
  - bashrc_stat_user.state | default('present') == 'present'
  register: users_bashrc_stats
  become: true
  tags: users

- name: Remove legacy powerline-go blocks from user bashrc
  ansible.builtin.replace:
    path: "{{ bashrc_cleanup_item.stat.path }}"
    regexp: '(?ms)^# BEGIN POWERLINE-GO\n.*?\n# END POWERLINE-GO\n?'
    replace: ''
  loop: "{{ users_bashrc_stats.results | default([]) }}"
  loop_control:
    loop_var: bashrc_cleanup_item
  when:
  - bashrc_cleanup_item.stat.exists | default(false)
  become: true
  tags: users

- name: Determine powerline-go architecture
  ansible.builtin.set_fact:
    users_powerline_go_arch_effective: "{{ users_powerline_go_arch_map[ansible_architecture] | default(ansible_architecture) }}"
  when: users_powerline_go_enabled | bool
  tags: users

- name: Install powerline-go binary
  ansible.builtin.get_url:
    url: "https://github.com/justjanne/powerline-go/releases/download/v{{ users_powerline_go_version }}/powerline-go-{{ ansible_system | lower }}-{{ users_powerline_go_arch_effective }}"
    dest: "{{ users_powerline_go_install_dir }}/{{ users_powerline_go_binary_name }}"
    mode: "0755"
    owner: root
    group: root
    checksum: "{{ users_powerline_go_checksum if users_powerline_go_checksum | length > 0 else omit }}"
  when:
  - users_powerline_go_enabled | bool
  - ansible_system | lower == 'linux'
  become: true
  tags: users

- name: Remove legacy git prompt profile script
  ansible.builtin.file:
    path: "/etc/profile.d/git-prompt.sh"
    state: absent
  become: true
  tags: users

- name: Install powerline-go profile script
  ansible.builtin.template:
    src: powerline-go.sh.j2
    dest: "/etc/profile.d/powerline-go.sh"
    owner: root
    group: root
    mode: "0644"
  when: users_powerline_go_enabled | bool
  become: true
  tags: users

- name: Copy scripts
  ansible.builtin.copy:
    src: "{{ item.source }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
  - source: ssh-agent.sh
    dest: "/etc/profile.d/ssh-agent.sh"
    mode: "0755"
  - source: bcrypt
    dest: "/usr/local/bin/bcrypt"
    mode: "0755"
  become: true
  tags: users

- name: Copy dot files for root
  ansible.builtin.copy:
    src: "{{ item.source }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
  - source: ms.sh
    dest: "/root/.ms.sh"
    mode: "0755"
  - source: tmux.conf
    dest: "/root/.tmux.conf"
    mode: "0644"
  - source: vimrc
    dest: "/root/.vimrc"
    mode: "0644"
  - source: gitconfig
    dest: "/root/.gitconfig"
    mode: "0644"
  when: users_manage_root_dotfiles | bool
  become: true
  tags: users

- name: Check if /etc/msmtprc exists
  ansible.builtin.stat:
    path: /etc/msmtprc
  register: msmtprc_stat
  when: users_copy_msmtp_config | bool
  tags: users

- name: Copy /etc/msmtprc to users home directories
  ansible.builtin.copy:
    src: "/etc/msmtprc"
    dest: "/home/{{ msmtp_user.name }}/.msmtprc"
    owner: "{{ msmtp_user.name }}"
    group: "{{ msmtp_user.name }}"
    mode: "0600"
    remote_src: true
  loop: "{{ users_list }}"
  loop_control:
    loop_var: msmtp_user
  become: true
  when:
  - users_list is defined
  - users_list | length > 0
  - msmtp_user.name != 'root'
  - msmtp_user.state | default('present') == 'present'
  - users_copy_msmtp_config | bool
  - msmtprc_stat.stat.exists
  tags: users

- name: Replace logfile path in /etc/msmtprc to ~/.msmtp.log
  ansible.builtin.replace:
    path: "/home/{{ msmtp_replace_user.name }}/.msmtprc"
    regexp: '^logfile.*'
    replace: "logfile         ~/.msmtp.log"
  loop: "{{ users_list }}"
  loop_control:
    loop_var: msmtp_replace_user
  become: true
  when:
  - users_list is defined
  - users_list | length > 0
  - msmtp_replace_user.name != 'root'
  - msmtp_replace_user.state | default('present') == 'present'
  - users_copy_msmtp_config | bool
  - msmtprc_stat.stat.exists
  tags: users
