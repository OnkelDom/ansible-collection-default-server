---
- name: Configure /etc/hostname
  ansible.builtin.hostname:
    name: "{{ hosts_hostname }}{{ '.' ~ hosts_domain if hosts_domain | length > 0 else '' }}"
  become: true
  tags: hosts

- name: Configure /etc/hosts
  ansible.builtin.template:
    src: hosts.j2
    dest: /etc/hosts
    owner: root
    group: root
    mode: "0644"
  become: true
  tags: hosts
