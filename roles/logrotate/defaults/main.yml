---
logrotate_manage_package: true
logrotate_package_state: present
logrotate_config_dir: /etc/logrotate.d
logrotate_file_prefix: onkeldom-
logrotate_prune_managed_files: false

logrotate_rule_defaults:
  state: present
  frequency: weekly
  rotate: 8
  missingok: true
  notifempty: true
  compress: true
  delaycompress: false
  copytruncate: false
  sharedscripts: false
  dateext: false
  dateyesterday: false
  create: false
  create_mode: "0640"
  create_owner: root
  create_group: root
  su_user:
  su_group:
  olddir:
  extension:
  dateformat:
  size:
  minsize:
  maxsize:
  minage:
  maxage:
  start:
  mail:
  mailfirst: false
  maillast: false
  firstaction: ""
  prerotate: ""
  postrotate: ""
  lastaction: ""
  extra_directives: []

logrotate_rules: []
