---
_wpad_webserver_map:
  apache:
    service_name: httpd
    config_path: /etc/httpd/conf.d/wpad.conf
    enabled_path: ""
    validate_command: /usr/sbin/httpd -t
  nginx:
    service_name: nginx
    config_path: /etc/nginx/conf.d/wpad.conf
    enabled_path: ""
    validate_command: /usr/sbin/nginx -t -c /etc/nginx/nginx.conf
wpad_selinux_packages:
- policycoreutils-python-utils
wpad_selinux_port_type: http_port_t
