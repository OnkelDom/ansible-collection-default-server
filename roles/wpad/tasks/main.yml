---
- name: Validate supported operating systems for wpad
  ansible.builtin.assert:
    that:
    - ansible_os_family in ["Debian", "RedHat"]
    fail_msg: The wpad role supports Debian and RedHat families only.

- name: Validate supported webservers for wpad
  ansible.builtin.assert:
    that:
    - wpad_webserver in ["apache", "nginx"]
    fail_msg: The wpad role supports only `apache` and `nginx` as webservers.

- name: Validate required WPAD values when present
  ansible.builtin.assert:
    that:
    - wpad_server_names | length > 0
    - wpad_return_string | length > 0 or wpad_proxy_targets | length > 0 or wpad_direct_fallback | bool
    fail_msg: Define at least one server name and either `wpad_return_string`, `wpad_proxy_targets`, or enable `wpad_direct_fallback`.
  when: wpad_state == "present"

- name: Load platform-specific vars for wpad
  ansible.builtin.include_vars: "{{ ansible_os_family | lower }}.yml"

- name: Install SELinux tooling for wpad
  ansible.builtin.package:
    name: policycoreutils-python-utils
    state: present
  when:
  - ansible_os_family == "RedHat"
  - wpad_manage_selinux | bool
  - ansible_selinux is defined
  - ansible_selinux.status == "enabled"
  become: true

- name: Select wpad webserver implementation
  ansible.builtin.set_fact:
    _wpad_webserver: "{{ _wpad_webserver_map[wpad_webserver] }}"

- name: Ensure wpad document root exists
  ansible.builtin.file:
    path: "{{ wpad_document_root }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: wpad_state == "present"

- name: Render proxy auto-configuration file
  ansible.builtin.template:
    src: proxy.pac.j2
    dest: "{{ wpad_document_root }}/{{ wpad_pac_filename }}"
    owner: root
    group: root
    mode: "0644"
  when: wpad_state == "present"

- name: Remove proxy auto-configuration file
  ansible.builtin.file:
    path: "{{ wpad_document_root }}/{{ wpad_pac_filename }}"
    state: absent
  when: wpad_state == "absent"

- name: Render wpad webserver configuration
  ansible.builtin.template:
    src: "{{ wpad_webserver }}_wpad.conf.j2"
    dest: "{{ _wpad_webserver.config_path }}"
    owner: root
    group: root
    mode: "0644"
  when:
  - wpad_manage_webserver_config | bool
  - wpad_state == "present"
  notify: Reload wpad webserver

- name: Enable apache site on Debian
  ansible.builtin.file:
    src: "{{ _wpad_webserver.config_path }}"
    dest: "{{ _wpad_webserver.enabled_path }}"
    state: link
  when:
  - wpad_manage_webserver_config | bool
  - wpad_state == "present"
  - wpad_webserver == "apache"
  - ansible_os_family == "Debian"
  notify: Reload wpad webserver

- name: Disable apache site on Debian
  ansible.builtin.file:
    path: "{{ _wpad_webserver.enabled_path }}"
    state: absent
  when:
  - wpad_manage_webserver_config | bool
  - wpad_webserver == "apache"
  - ansible_os_family == "Debian"
  - _wpad_webserver.enabled_path | length > 0
  - wpad_state == "absent"
  notify: Reload wpad webserver

- name: Remove wpad webserver configuration
  ansible.builtin.file:
    path: "{{ _wpad_webserver.config_path }}"
    state: absent
  when:
  - wpad_manage_webserver_config | bool
  - wpad_state == "absent"
  notify: Reload wpad webserver

- name: Ensure wpad webserver service state
  ansible.builtin.service:
    name: "{{ _wpad_webserver.service_name }}"
    enabled: "{{ wpad_service_enabled }}"
    state: "{{ wpad_service_state }}"
  when:
  - wpad_manage_service | bool
  - wpad_state == "present"
  become: true

- name: Open WPAD port in firewalld
  ansible.posix.firewalld:
    port: "{{ wpad_listen_port }}/tcp"
    permanent: true
    immediate: true
    state: enabled
    zone: "{{ wpad_firewall_zone }}"
  when:
  - wpad_manage_firewall | bool
  - ansible_os_family == "RedHat"
  become: true

- name: Open WPAD port in UFW
  community.general.ufw:
    rule: allow
    port: "{{ wpad_listen_port }}"
    proto: tcp
    comment: WPAD
  when:
  - wpad_manage_firewall | bool
  - ansible_os_family == "Debian"
  become: true

- name: Allow WPAD port in SELinux
  community.general.seport:
    ports: "{{ wpad_listen_port }}"
    proto: tcp
    setype: http_port_t
    state: present
  when:
  - ansible_os_family == "RedHat"
  - wpad_manage_selinux | bool
  - ansible_selinux is defined
  - ansible_selinux.status == "enabled"
  become: true
