---
- name: Validate supported platform
  ansible.builtin.assert:
    that:
    - ansible_os_family == "Debian"
    fail_msg: "The interfaces role supports Debian-family systems only."
  tags: interfaces

- name: Ensure packages installed
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when: ansible_os_family == "Debian"
  become: true
  changed_when: false
  tags: interfaces

- name: Ensure packages installed
  ansible.builtin.package:
    name: "{{ interfaces_packages }}"
    state: present
  become: true
  tags: interfaces

- name: Configure network interfaces
  ansible.builtin.template:
    src: interfaces.j2
    dest: /etc/network/interfaces
    owner: root
    group: root
    mode: '0644'
  notify: Restart networking
  become: true
  tags: interfaces

- name: Ensure networking is enabled and started
  ansible.builtin.service:
    name: networking
    state: started
    enabled: true
  become: true
  tags: interfaces
