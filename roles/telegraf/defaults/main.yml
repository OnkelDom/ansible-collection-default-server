---
# Telegraf default settings
telegraf_manage_repository: true
telegraf_manage_service: true
telegraf_service_enabled: true
telegraf_service_state: started
telegraf_manage_firewall: false
telegraf_firewall_zone: public
telegraf_manage_selinux: true
telegraf_firewall_ports:
- 9273/tcp
telegraf_apt_repo: "deb [signed-by=/etc/apt/keyrings/influxdata.gpg] https://repos.influxdata.com/debian stable main"
telegraf_yum_repo_baseurl: "https://repos.influxdata.com/rhel/$releasever/$basearch/stable"
telegraf_gpg_key_url: "https://repos.influxdata.com/influxdb.key"
telegraf_config_path: /etc/telegraf/telegraf.conf
telegraf_plugins_path: /etc/telegraf/telegraf.d
telegraf_service_name: telegraf
telegraf_package_name: telegraf
telegraf_plugins: []

# Default configuration for Telegraf
telegraf_config:
  agent:
    interval: "10s"
    round_interval: true
    metric_batch_size: 1000
    metric_buffer_limit: 10000
    collection_jitter: "0s"
    flush_interval: "10s"
    flush_jitter: "0s"
    precision: ""
    hostname: "{{ ansible_hostname }}"
    omit_hostname: false
  outputs:
  - type: "loki"
    config:
      url: "http://loki.local:3100/loki/api/v1/push"
      labels:
        job: "telegraf"
        host: "{{ ansible_hostname }}"
  - type: "prometheus_client"
    config:
      listen: ":9273"
      metric_version: 2
    # - type: "syslog"
    #   config:
    #     server: "tcp://syslog01.wolf.local:514"
    #     syslog_protocol: "rfc5424"
  inputs:
  - type: "cpu"
    config:
      percpu: true
      totalcpu: true
      collect_cpu_time: false
      report_active: false
  - type: "mem"
    config: {}
  - type: "disk"
    config:
      ignore_fs: ["tmpfs", "devtmpfs"]
  - type: "net"
    config: {}
  - type: "system"
    config: {}
  - type: "smart"
    config:
      attributes: true
      devices: ["/dev/sda", "/dev/vda", "/dev/sdb", "/dev/vdb"]
  - type: "procstat"
    config:
      pid_file: "/var/run/sshd.pid"
  - type: "service"
    config:
      services:
      - sshd
      - cron
      - systemd-journald
  - type: "journald"
    config:
      files: ["/var/log/journal"]
        #units: ["sshd.service", "cron.service", "nginx.service"]
      from_beginning: false
      max_entries: 5000
  - type: "logparser"
    config:
      files: ["/var/log/syslog", "/var/log/messages"]
      from_beginning: true
      name_override: "journald"
