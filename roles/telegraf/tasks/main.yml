---
- name: Install GPG key
  ansible.builtin.get_url:
    url: "{{ telegraf_gpg_key_url }}"
    dest: /etc/apt/trusted.gpg.d/influxdb.gpg
    mode: '0644'
  when: ansible_os_family == 'Debian'
  become: true
  tags: telegraf

- name: Add Telegraf repository (Debian)
  ansible.builtin.apt_repository:
    repo: "deb {{ telegraf_repo_url }}"
  when: ansible_os_family == 'Debian'
  become: true
  tags: telegraf

- name: Add Telegraf repository (RedHat)
  ansible.builtin.yum_repository:
    name: influxdata
    description: InfluxData Telegraf repository
    baseurl: "{{ telegraf_repo_url }}"
    gpgcheck: true
    gpgkey: "{{ telegraf_gpg_key_url }}"
  when: ansible_os_family == 'RedHat'
  become: true
  tags: telegraf

- name: Install Telegraf
  ansible.builtin.package:
    name: telegraf
    state: present
  become: true
  tags: telegraf

- name: Create plugins directory
  ansible.builtin.file:
    path: "{{ telegraf_plugins_path }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true
  tags: telegraf

- name: Deploy Telegraf main configuration
  ansible.builtin.template:
    src: telegraf.conf.j2
    dest: "{{ telegraf_config_path }}"
    owner: root
    group: root
    mode: '0644'
  notify: Restart Telegraf
  become: true
  tags: telegraf

- name: Deploy Telegraf plugin configurations
  ansible.builtin.template:
    src: plugins.conf.j2
    dest: "{{ telegraf_plugins_path }}/{{ item.type }}.conf"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ telegraf_plugins }}"
  loop_control:
    label: "{{ item.type }}"
  notify: Restart Telegraf
  become: true
  tags: telegraf

- name: Start and enable Telegraf
  ansible.builtin.systemd:
    daemon_reload: true
    name: "{{ telegraf_service_name }}"
    enabled: true
    state: started
  become: true
  tags: telegraf
