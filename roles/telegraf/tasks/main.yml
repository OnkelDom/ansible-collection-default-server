---
- name: Validate supported platform
  ansible.builtin.assert:
    that:
    - ansible_os_family in ["Debian", "RedHat"]
    fail_msg: "The telegraf role supports Debian and RedHat families only."
  tags: telegraf

- name: Ensure apt keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
  - telegraf_manage_repository | bool
  - ansible_os_family == 'Debian'
  become: true
  tags: telegraf

- name: Install GPG key
  ansible.builtin.get_url:
    url: "{{ telegraf_gpg_key_url }}"
    dest: "{{ '/etc/apt/keyrings/influxdata.gpg' if ansible_os_family == 'Debian' else '/etc/pki/rpm-gpg/RPM-GPG-KEY-influxdata' }}"
    mode: '0644'
  when: telegraf_manage_repository | bool
  become: true
  tags: telegraf

- name: Add Telegraf repository (Debian)
  ansible.builtin.apt_repository:
    repo: "{{ telegraf_apt_repo }}"
  when:
  - telegraf_manage_repository | bool
  - ansible_os_family == 'Debian'
  become: true
  tags: telegraf

- name: Add Telegraf repository (RedHat)
  ansible.builtin.yum_repository:
    name: influxdata
    description: InfluxData Telegraf repository
    baseurl: "{{ telegraf_yum_repo_baseurl }}"
    enabled: true
    gpgcheck: true
    gpgkey: "{{ telegraf_gpg_key_url }}"
  when:
  - telegraf_manage_repository | bool
  - ansible_os_family == 'RedHat'
  become: true
  tags: telegraf

- name: Install Telegraf
  ansible.builtin.package:
    name: "{{ telegraf_package_name }}"
    state: present
  become: true
  tags: telegraf

- name: Create plugins directory
  ansible.builtin.file:
    path: "{{ telegraf_plugins_path }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true
  tags: telegraf

- name: Deploy Telegraf main configuration
  ansible.builtin.template:
    src: telegraf.conf.j2
    dest: "{{ telegraf_config_path }}"
    owner: root
    group: root
    mode: '0644'
  notify: Restart Telegraf
  become: true
  tags: telegraf

- name: Deploy Telegraf plugin configurations
  ansible.builtin.template:
    src: plugins.conf.j2
    dest: "{{ telegraf_plugins_path }}/{{ item.type }}.conf"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ telegraf_plugins }}"
  loop_control:
    label: "{{ item.type }}"
  notify: Restart Telegraf
  become: true
  tags: telegraf

- name: Start and enable Telegraf
  ansible.builtin.systemd:
    daemon_reload: true
    name: "{{ telegraf_service_name }}"
    enabled: true
    state: started
  become: true
  tags: telegraf
