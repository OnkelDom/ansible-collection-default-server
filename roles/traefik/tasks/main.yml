---
- name: Validate supported platform
  ansible.builtin.assert:
    that:
    - ansible_os_family in ["Debian", "RedHat"]
    fail_msg: "The traefik role supports Debian and RedHat families only."
  tags: traefik

- name: Include RedHat-specific variables for traefik
  ansible.builtin.include_vars: redhat.yml
  when: ansible_os_family == "RedHat"
  tags: traefik

- name: Install SELinux tooling for traefik
  ansible.builtin.package:
    name: "{{ traefik_selinux_packages }}"
    state: present
  when:
  - ansible_os_family == "RedHat"
  - traefik_manage_selinux | bool
  - ansible_selinux is defined
  - ansible_selinux.status == "enabled"
  become: true
  tags: traefik

- name: Create traefik group
  ansible.builtin.group:
    name: "{{ traefik_group }}"
    system: true
    state: present
  become: true
  tags: traefik

- name: Create traefik user
  ansible.builtin.user:
    name: "{{ traefik_user }}"
    system: true
    shell: /sbin/nologin
    group: "{{ traefik_group }}"
    create_home: false
  become: true
  tags: traefik

- name: Ensure traefik directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(traefik_user) }}"
    group: "{{ item.group | default(traefik_group) }}"
    mode: "{{ item.mode }}"
  loop:
  - path: "{{ traefik_binary_install_dir }}"
    owner: root
    group: root
    mode: "0755"
  - path: /etc/traefik
    mode: "0755"
  - path: /etc/traefik/rules
    mode: "0755"
  - path: /etc/traefik/acme
    mode: "0700"
  - path: /etc/traefik/certs
    mode: "0755"
  - path: /var/log/traefik
    mode: "0755"
  become: true
  tags: traefik

- name: Check installed traefik binary
  ansible.builtin.stat:
    path: "{{ traefik_binary_path }}"
  register: __traefik_binary
  become: true
  tags: traefik

- name: Read installed traefik version
  ansible.builtin.command: "{{ traefik_binary_path }} version"
  register: __traefik_version
  changed_when: false
  when: __traefik_binary.stat.exists
  become: true
  tags: traefik

- name: Download traefik archive
  ansible.builtin.get_url:
    url: "https://github.com/traefik/traefik/releases/download/v{{ traefik_version }}/traefik_v{{ traefik_version }}_linux_{{ go_arch }}.tar.gz"
    dest: "/tmp/traefik-{{ traefik_version }}.linux-{{ go_arch }}.tar.gz"
    mode: "0644"
  environment: "{{ proxy_env }}"
  when: not __traefik_binary.stat.exists or (__traefik_version.stdout is not search(traefik_version))
  become: true
  tags: traefik

- name: Unpack traefik archive
  ansible.builtin.unarchive:
    src: "/tmp/traefik-{{ traefik_version }}.linux-{{ go_arch }}.tar.gz"
    dest: /tmp
    remote_src: true
  when: not __traefik_binary.stat.exists or (__traefik_version.stdout is not search(traefik_version))
  become: true
  tags: traefik

- name: Install traefik binary
  ansible.builtin.copy:
    src: /tmp/traefik
    dest: "{{ traefik_binary_path }}"
    owner: root
    group: root
    mode: "0755"
    remote_src: true
  when: not __traefik_binary.stat.exists or (__traefik_version.stdout is not search(traefik_version))
  notify: Restart traefik
  become: true
  tags: traefik

- name: Render main traefik config
  ansible.builtin.copy:
    content: "{{ traefik_config | to_nice_yaml(indent=2, sort_keys=False) }}\n"
    dest: /etc/traefik/config.yml
    owner: "{{ traefik_user }}"
    group: "{{ traefik_group }}"
    mode: "0644"
  notify: Reload traefik
  become: true
  tags: traefik

- name: Render traefik rule files
  ansible.builtin.copy:
    content: "{{ item.value | to_nice_yaml(indent=2, sort_keys=False) }}\n"
    dest: "/etc/traefik/rules/{{ item.key }}.yml"
    owner: "{{ traefik_user }}"
    group: "{{ traefik_group }}"
    mode: "0644"
  loop: "{{ traefik_rules_config | dict2items }}"
  notify: Reload traefik
  become: true
  tags: traefik

- name: Copy static rule files
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /etc/traefik/rules/
    owner: "{{ traefik_user }}"
    group: "{{ traefik_group }}"
    mode: "0644"
  loop: "{{ traefik_rules_files }}"
  notify: Reload traefik
  become: true
  tags: traefik

- name: Copy custom certificates
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /etc/traefik/certs/
    owner: "{{ traefik_user }}"
    group: "{{ traefik_group }}"
    mode: "0400"
    decrypt: true
  loop: "{{ traefik_custom_cert_files }}"
  notify: Restart traefik
  become: true
  tags: traefik

- name: Ensure acme store exists
  ansible.builtin.file:
    path: /etc/traefik/acme/acme.json
    state: touch
    owner: "{{ traefik_user }}"
    group: "{{ traefik_group }}"
    mode: "0600"
  become: true
  tags: traefik

- name: Install traefik systemd unit
  ansible.builtin.template:
    src: traefik.service.j2
    dest: /etc/systemd/system/traefik.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart traefik
  become: true
  tags: traefik

- name: Open traefik ports in firewalld
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
    zone: "{{ traefik_firewall_zone }}"
  loop: "{{ traefik_firewall_ports }}"
  when:
  - traefik_manage_firewall | bool
  - ansible_os_family == "RedHat"
  become: true
  tags: traefik

- name: Open traefik ports in UFW
  community.general.ufw:
    rule: allow
    port: "{{ item.split('/')[0] }}"
    proto: "{{ item.split('/')[1] }}"
    comment: Traefik
  loop: "{{ traefik_firewall_ports }}"
  when:
  - traefik_manage_firewall | bool
  - ansible_os_family == "Debian"
  become: true
  tags: traefik

- name: Allow traefik ports in SELinux
  community.general.seport:
    ports: "{{ item.split('/')[0] }}"
    proto: "{{ item.split('/')[1] }}"
    setype: "{{ traefik_selinux_port_type }}"
    state: present
  loop: "{{ traefik_selinux_ports }}"
  when:
  - ansible_os_family == "RedHat"
  - traefik_manage_selinux | bool
  - ansible_selinux is defined
  - ansible_selinux.status == "enabled"
  become: true
  tags: traefik

- name: Ensure traefik service is started and enabled
  ansible.builtin.systemd:
    daemon_reload: true
    name: "{{ traefik_service_name }}"
    enabled: "{{ traefik_service_enabled }}"
    state: "{{ traefik_service_state }}"
  when: traefik_manage_service | bool
  become: true
  tags: traefik
