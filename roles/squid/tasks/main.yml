---
- name: Validate supported platform
  ansible.builtin.assert:
    that:
    - ansible_os_family in ["Debian", "RedHat"]
    fail_msg: "The squid role supports Debian and RedHat families only."
  tags: squid

- name: Include OS-specific variables
  ansible.builtin.include_vars: "{{ ansible_os_family | lower }}.yml"
  tags: squid

- name: Install Squid package
  ansible.builtin.package:
    name: "{{ squid_package_name }}"
    state: present
  environment: "{{ proxy_env }}"
  become: true
  tags: squid

- name: Ensure Squid configuration directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
  - "{{ squid_config_dir }}"
  - "{{ squid_conf_d_dir }}"
  become: true
  tags: squid

- name: Remove obsolete default config files
  ansible.builtin.file:
    path: "{{ squid_config_dir }}/{{ item }}"
    state: absent
  loop:
  - cachemgr.conf.default
  - errorpage.css.default
  - mime.conf.default
  - squid.conf.default
  become: true
  tags: squid

- name: Render Squid ACL file entries
  ansible.builtin.template:
    src: acl_file.j2
    dest: "{{ squid_conf_d_dir }}/{{ item.name }}.lst"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ squid_acl_files }}"
  loop_control:
    label: "{{ item.name }}"
  notify: Reload squid
  become: true
  tags: squid

- name: Deploy Squid configuration
  ansible.builtin.template:
    src: squid.conf.j2
    dest: "{{ squid_config_path }}"
    owner: root
    group: root
    mode: "0644"
    validate: "/usr/sbin/squid -k parse -f %s"
  notify: Reload squid
  become: true
  tags: squid

- name: Open Squid port in UFW
  community.general.ufw:
    rule: allow
    port: "{{ squid_port }}"
    proto: tcp
    comment: Squid proxy
  when:
  - squid_manage_firewall | bool
  - ansible_os_family == "Debian"
  become: true
  tags: squid

- name: Open Squid port in firewalld
  ansible.posix.firewalld:
    port: "{{ squid_port }}/tcp"
    permanent: true
    immediate: true
    state: enabled
  when:
  - squid_manage_firewall | bool
  - ansible_os_family == "RedHat"
  become: true
  tags: squid

- name: Ensure Squid service state
  ansible.builtin.service:
    name: "{{ squid_service_name }}"
    enabled: "{{ squid_service_enabled }}"
    state: "{{ squid_service_state }}"
  when: squid_manage_service | bool
  become: true
  tags: squid
