---
- name: Validate supported platform
  ansible.builtin.assert:
    that:
    - ansible_os_family == "Debian"
    fail_msg: The apt_repos role supports Debian-family systems only.
  tags: apt_repos

- name: Ensure repository directory exists
  ansible.builtin.file:
    path: "{{ apt_repos_directory }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags: apt_repos

- name: Ensure keyring directory exists
  ansible.builtin.file:
    path: "{{ apt_repos_keyring_directory }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: apt_repos_manage_keys | bool
  become: true
  tags: apt_repos

- name: Discover existing APT source files
  ansible.builtin.find:
    paths: "{{ apt_repos_directory }}"
    patterns: "*.sources"
    file_type: file
  register: _apt_repos_existing_files
  when: apt_repos_remove_original | bool
  become: true
  tags: apt_repos

- name: Download managed APT signing keys
  ansible.builtin.get_url:
    url: "{{ item.key_url }}"
    dest: "{{ item.key_path | default(apt_repos_keyring_directory ~ '/' ~ item.name ~ '.asc') }}"
    owner: root
    group: root
    mode: "0644"
    timeout: 30
  loop: "{{ apt_repos_list }}"
  loop_control:
    label: "{{ item.name }}"
  when:
  - apt_repos_manage_keys | bool
  - item.state | default('present') == 'present'
  - item.key_url is defined
  become: true
  tags: apt_repos

- name: Write managed APT signing keys from inline content
  ansible.builtin.copy:
    content: "{{ item.key_content }}"
    dest: "{{ item.key_path | default(apt_repos_keyring_directory ~ '/' ~ item.name ~ '.asc') }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ apt_repos_list }}"
  loop_control:
    label: "{{ item.name }}"
  when:
  - apt_repos_manage_keys | bool
  - item.state | default('present') == 'present'
  - item.key_content is defined
  become: true
  tags: apt_repos

- name: Remove unmanaged APT source files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ _apt_repos_existing_files.files }}"
  loop_control:
    label: "{{ item.path }}"
  when:
  - apt_repos_remove_original | bool
  - item.path | basename not in (
      apt_repos_list
      | selectattr('state', 'undefined')
      | map(attribute='filename')
      | reject('equalto', None)
      | map('regex_replace', '$', '.sources')
      | list
      +
      apt_repos_list
      | selectattr('state', 'defined')
      | selectattr('state', 'equalto', 'present')
      | map(attribute='filename')
      | reject('equalto', None)
      | map('regex_replace', '$', '.sources')
      | list
      +
      apt_repos_list
      | selectattr('state', 'undefined')
      | map(attribute='name')
      | map('regex_replace', '$', '.sources')
      | list
      +
      apt_repos_list
      | selectattr('state', 'defined')
      | selectattr('state', 'equalto', 'present')
      | map(attribute='name')
      | map('regex_replace', '$', '.sources')
      | list
    )
  become: true
  tags: apt_repos

- name: Render APT repository definitions
  ansible.builtin.template:
    src: repo.sources.j2
    dest: "{{ apt_repos_directory }}/{{ item.filename | default(item.name) }}.sources"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ apt_repos_list }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.state | default('present') == 'present'
  register: _apt_repos_rendered
  become: true
  tags: apt_repos

- name: Remove absent APT repository definitions
  ansible.builtin.file:
    path: "{{ apt_repos_directory }}/{{ item.filename | default(item.name) }}.sources"
    state: absent
  loop: "{{ apt_repos_list }}"
  loop_control:
    label: "{{ item.name }}"
  when: item.state | default('present') == 'absent'
  register: _apt_repos_removed
  become: true
  tags: apt_repos

- name: Remove managed APT signing keys for absent repositories
  ansible.builtin.file:
    path: "{{ item.key_path | default(apt_repos_keyring_directory ~ '/' ~ item.name ~ '.asc') }}"
    state: absent
  loop: "{{ apt_repos_list }}"
  loop_control:
    label: "{{ item.name }}"
  when:
  - apt_repos_manage_keys | bool
  - item.state | default('present') == 'absent'
  - item.key_url is defined or item.key_content is defined or item.key_path is defined
  register: _apt_repos_keys_removed
  become: true
  tags: apt_repos

- name: Refresh APT package cache after repository changes
  ansible.builtin.apt:
    update_cache: true
  when:
  - apt_repos_manage_cache | bool
  - (_apt_repos_rendered is changed) or (_apt_repos_removed is changed) or (_apt_repos_keys_removed is changed)
  changed_when: false
  become: true
  tags: apt_repos
