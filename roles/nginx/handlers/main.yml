---
- name: Restart nginx
  ansible.builtin.service:
    name: "{{ nginx_service_name | default('nginx') }}"
    state: restarted
  become: true
  tags: nginx

- name: Validate nginx configuration
  ansible.builtin.command: nginx -t -c /etc/nginx/nginx.conf
  changed_when: false
  become: true
  tags: nginx

- name: Reload nginx
  ansible.builtin.service:
    name: "{{ nginx_service_name | default('nginx') }}"
    state: reloaded
  when: nginx_service_state == "started"
  become: true
  tags: nginx
