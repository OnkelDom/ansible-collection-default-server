---
- name: Gather operating system variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
  - "{{ ansible_distribution | lower }}-{{ ansible_distribution_version | lower }}.yml"
  - "{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version | lower }}.yml"
  - "{{ ansible_distribution_file_variety | lower }}-{{ ansible_distribution_major_version | lower }}.yml"
  - "{{ ansible_os_family | lower }}-{{ ansible_distribution_major_version | lower }}.yml"
  - "{{ ansible_distribution | lower }}.yml"
  - "{{ ansible_os_family | lower }}-{{ ansible_distribution_version.split('.')[0] }}.yml"
  - "{{ ansible_os_family | lower }}.yml"
  tags: nginx

- name: Validate supported platform
  ansible.builtin.assert:
    that:
    - ansible_os_family in ["Debian", "RedHat"]
    fail_msg: "The nginx role supports Debian and RedHat families only."
  tags: nginx

- name: Install SELinux tooling for nginx
  ansible.builtin.package:
    name: "{{ nginx_selinux_packages }}"
    state: present
  when:
  - ansible_os_family == "RedHat"
  - nginx_manage_selinux | bool
  - ansible_selinux is defined
  - ansible_selinux.status == "enabled"
  become: true
  tags: nginx

- name: Define nginx_user.
  ansible.builtin.set_fact:
    nginx_user: "{{ __nginx_user }}"
  when: nginx_user is not defined
  tags: nginx

# Setup/install tasks.
- name: Setup nginx on RedHat
  ansible.builtin.include_tasks: setup-RedHat.yml
  when: ansible_os_family == 'RedHat'
  tags: nginx

- name: Setup nginx on Ubuntu
  ansible.builtin.include_tasks: setup-Ubuntu.yml
  when: ansible_distribution == 'Ubuntu'
  tags: nginx

- name: Setup nginx package on Debian family
  ansible.builtin.include_tasks: setup-Debian.yml
  when: ansible_os_family == 'Debian'
  tags: nginx

# Vhost configuration.
- name: Manage nginx vhosts
  ansible.builtin.import_tasks: vhosts.yml
  tags: nginx

# Nginx setup.
- name: Copy nginx configuration in place.
  ansible.builtin.template:
    src: "{{ nginx_conf_template }}"
    dest: "{{ nginx_conf_file_path }}"
    owner: root
    group: "{{ root_group }}"
    mode: "0644"
    validate: "{{ nginx_validate_binary }} -t -c %s"
  notify:
  - Reload nginx
  become: true
  tags: nginx

- name: Open nginx ports in firewalld
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
    zone: "{{ nginx_firewall_zone }}"
  loop: "{{ nginx_firewall_ports }}"
  when:
  - nginx_manage_firewall | bool
  - ansible_os_family == "RedHat"
  become: true
  tags: nginx

- name: Open nginx ports in UFW
  community.general.ufw:
    rule: allow
    port: "{{ item.split('/')[0] }}"
    proto: "{{ item.split('/')[1] }}"
    comment: Nginx
  loop: "{{ nginx_firewall_ports }}"
  when:
  - nginx_manage_firewall | bool
  - ansible_os_family == "Debian"
  become: true
  tags: nginx

- name: Allow nginx ports in SELinux
  community.general.seport:
    ports: "{{ item.split('/')[0] }}"
    proto: "{{ item.split('/')[1] }}"
    setype: "{{ nginx_selinux_port_type }}"
    state: present
  loop: "{{ nginx_firewall_ports }}"
  when:
  - ansible_os_family == "RedHat"
  - nginx_manage_selinux | bool
  - ansible_selinux is defined
  - ansible_selinux.status == "enabled"
  become: true
  tags: nginx

- name: Ensure nginx service is running as configured.
  ansible.builtin.service:
    name: "{{ nginx_service_name | default('nginx') }}"
    state: "{{ nginx_service_state }}"
    enabled: "{{ nginx_service_enabled }}"
  when: nginx_manage_service | bool
  become: true
  tags: nginx
