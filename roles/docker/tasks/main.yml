---
- name: Validate supported platform
  ansible.builtin.assert:
    that:
    - ansible_os_family in ["Debian", "RedHat"]
    - (ansible_os_family == "Debian" and ((ansible_distribution == "Ubuntu" and ansible_distribution_major_version | int >= 22) or (ansible_distribution == "Debian" and ansible_distribution_major_version | int >= 12))) or (ansible_os_family == "RedHat" and ansible_distribution_major_version | int >= 9)
    - ansible_os_family != "Debian" or ansible_architecture in docker_apt_architecture_map
    fail_msg: "The docker role supports Ubuntu 22.04+, Debian 12+, and RedHat-family 9+ systems with a supported architecture."
  tags: docker

- name: Gather operating system variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
  - "{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version | lower }}.yml"
  - "{{ ansible_distribution | lower }}.yml"
  - "{{ ansible_os_family | lower }}.yml"
  - main.yml
  tags: docker

- name: Remove conflicting Docker packages
  ansible.builtin.package:
    name: "{{ docker_conflicting_packages }}"
    state: absent
  when: docker_remove_conflicting_packages | bool
  become: true
  tags: docker

- name: Install repository prerequisite packages
  ansible.builtin.package:
    name: "{{ docker_repository_prerequisite_packages }}"
    state: present
  when: docker_manage_repository | bool
  become: true
  tags: docker

- name: Ensure apt keyring directory exists
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    owner: root
    group: root
    mode: "0755"
  when:
  - docker_manage_repository | bool
  - ansible_os_family == "Debian"
  become: true
  tags: docker

- name: Install Docker apt signing key
  ansible.builtin.get_url:
    url: "{{ docker_repository_gpg_key_url }}"
    dest: "{{ docker_apt_keyring_path }}"
    owner: root
    group: root
    mode: "0644"
  when:
  - docker_manage_repository | bool
  - ansible_os_family == "Debian"
  become: true
  tags: docker

- name: Configure Docker apt repository
  ansible.builtin.template:
    src: docker.sources.j2
    dest: /etc/apt/sources.list.d/docker.sources
    owner: root
    group: root
    mode: "0644"
  when:
  - docker_manage_repository | bool
  - ansible_os_family == "Debian"
  become: true
  tags: docker

- name: Configure Docker yum repository
  ansible.builtin.yum_repository:
    name: docker-ce-stable
    description: Docker CE Stable - $basearch
    baseurl: "{{ docker_yum_repository_baseurl }}"
    enabled: true
    gpgcheck: true
    gpgkey: "{{ docker_repository_gpg_key_url }}"
  when:
  - docker_manage_repository | bool
  - ansible_os_family == "RedHat"
  become: true
  tags: docker

- name: Refresh apt cache after repository changes
  ansible.builtin.apt:
    update_cache: true
  when:
  - docker_manage_repository | bool
  - ansible_os_family == "Debian"
  become: true
  tags: docker

- name: Install Docker packages
  ansible.builtin.package:
    name: "{{ docker_packages }}"
    state: present
  become: true
  tags: docker

- name: Ensure Docker configuration directory exists
  ansible.builtin.file:
    path: "{{ docker_daemon_config_file | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: docker_manage_daemon_config | bool
  become: true
  tags: docker

- name: Deploy Docker daemon configuration
  ansible.builtin.template:
    src: daemon.json.j2
    dest: "{{ docker_daemon_config_file }}"
    owner: root
    group: root
    mode: "0644"
    validate: "{{ docker_daemon_validate_binary }} --validate --config-file=%s"
  when: docker_manage_daemon_config | bool
  notify: Restart docker
  become: true
  tags: docker

- name: Ensure Docker service is started and enabled
  ansible.builtin.systemd:
    name: "{{ docker_service_name }}"
    enabled: "{{ docker_service_enabled }}"
    state: "{{ docker_service_state }}"
    daemon_reload: true
  when: docker_manage_service | bool
  become: true
  tags: docker

- name: Add operators to the docker group
  ansible.builtin.user:
    name: "{{ item }}"
    groups: "{{ docker_group_name }}"
    append: true
  loop: "{{ docker_users }}"
  when: docker_users | length > 0
  become: true
  tags: docker
