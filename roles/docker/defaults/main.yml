---
docker_manage_repository: true
docker_remove_conflicting_packages: false
docker_manage_daemon_config: true
docker_manage_service: true
docker_service_enabled: true
docker_service_state: started
docker_users: []
docker_packages:
- docker-ce
- docker-ce-cli
- containerd.io
- docker-buildx-plugin
- docker-compose-plugin

# Keep the default daemon configuration intentionally small and valid.
# Operators can extend this dictionary with any supported dockerd option.
docker_daemon_config: {}
