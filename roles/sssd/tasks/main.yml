---
- name: Gather operating system variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
  - "{{ ansible_distribution | lower }}-{{ ansible_distribution_version | lower }}.yml"
  - "{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version | lower }}.yml"
  - "{{ ansible_distribution_file_variety | lower }}-{{ ansible_distribution_major_version | lower }}.yml"
  - "{{ ansible_os_family | lower }}-{{ ansible_distribution_major_version | lower }}.yml"
  - "{{ ansible_distribution | lower }}.yml"
  - "{{ ansible_os_family | lower }}-{{ ansible_distribution_version.split('.')[0] }}.yml"
  - "{{ ansible_os_family | lower }}.yml"
  tags: sssd

- name: Validate supported platform
  ansible.builtin.assert:
    that:
    - ansible_os_family in ["Debian", "RedHat"]
    fail_msg: "The sssd role supports Debian and RedHat families only."
  tags: sssd

- name: Install packages
  ansible.builtin.package:
    state: present
    name: "{{ sssd_packages }}"
  become: true
  tags: sssd

- name: Ensure oddjobd is enabled on RedHat
  ansible.builtin.service:
    name: "{{ sssd_oddjob_service_name }}"
    state: started
    enabled: true
  when:
  - ansible_os_family == "RedHat"
  - sssd_manage_mkhomedir | bool
  become: true
  tags: sssd

- name: Configure realmd.conf
  ansible.builtin.template:
    src: realmd.conf.j2
    dest: /etc/realmd.conf
    mode: "0644"
    backup: true
  notify: Restart sssd
  become: true
  tags: sssd

- name: Check joined realms
  ansible.builtin.command:
    cmd: "{{ sssd_realm_binary }} list --name-only"
  register: __sssd_realm_list
  changed_when: false
  failed_when: false
  become: true
  tags: sssd

- name: Fail when domain join credentials are missing
  ansible.builtin.fail:
    msg: "sssd_bind_user and sssd_bind_password are required to join {{ sssd_domain_name }}."
  when:
  - sssd_join_domain | bool
  - sssd_domain_name not in (__sssd_realm_list.stdout_lines | default([]))
  - sssd_bind_user | length == 0 or sssd_bind_password | length == 0
  tags: sssd

- name: Join system to AD
  ansible.builtin.expect:
    command: >-
      {{ sssd_realm_binary }} --verbose join {{ sssd_domain_name }}
      --user {{ sssd_bind_user }}
      {% if sssd_ou_to_join_servers | length > 0 %}--computer-ou '{{ sssd_ou_to_join_servers }}'{% endif %}
    responses:
      Password for *: "{{ sssd_bind_password }}"
  no_log: true
  when:
  - sssd_join_domain | bool
  - sssd_domain_name not in (__sssd_realm_list.stdout_lines | default([]))
  - sssd_bind_user | length > 0
  - sssd_bind_password | length > 0
  become: true
  tags: sssd

- name: Fix sending sudo spam emails
  ansible.builtin.lineinfile:
    path: /etc/sssd/sssd.conf
    regexp: '^services ='
    line: services = nss, pam, sudo, ssh
  notify: Restart sssd
  become: true
  tags: sssd

- name: Restrict access based on specific ad group
  ansible.builtin.command:
    cmd: "{{ sssd_realm_binary }} -v permit -g {{ item }}"
  changed_when: false
  loop: "{{ [sssd_ad_group_allowed_ssh_and_sudo] + (sssd_ad_group_allowed_ssh_and_sudo_extra | default([])) }}"
  when:
  - sssd_restrict_access | bool
  - sssd_domain_name in (__sssd_realm_list.stdout_lines | default([]))
  - item | length > 0
  become: true
  tags: sssd

- name: Configure sudoers file
  ansible.builtin.template:
    src: sudoers_ad_group.j2
    dest: /etc/sudoers.d/sudoers_ad_group
    backup: true
    mode: "0440"
  become: true
  tags: sssd

- name: Add pam_mkhomedir.so after pam_unix.so
  ansible.builtin.lineinfile:
    path: /etc/pam.d/common-session
    insertafter: 'pam_unix.so'
    line: 'session required    pam_mkhomedir.so skel=/etc/skel/ umask=0077'
  when:
  - ansible_os_family == "Debian"
  - sssd_manage_mkhomedir | bool
  become: true
  tags: sssd

- name: Enable mkhomedir through authselect on RedHat
  ansible.builtin.command:
    cmd: authselect select sssd with-mkhomedir --force
  when:
  - ansible_os_family == "RedHat"
  - sssd_manage_mkhomedir | bool
  changed_when: true
  failed_when: false
  become: true
  tags: sssd

- name: Ensure sssd service is started and enabled
  ansible.builtin.service:
    name: sssd
    state: started
    enabled: true
  become: true
  tags: sssd
