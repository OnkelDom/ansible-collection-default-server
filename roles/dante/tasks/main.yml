---
- name: Validate supported platform
  ansible.builtin.assert:
    that:
    - ansible_os_family in ["Debian", "RedHat"]
    fail_msg: "The dante role supports Debian and RedHat families only."
  tags: dante

- name: Include OS-specific variables
  ansible.builtin.include_vars: "{{ ansible_os_family | lower }}.yml"
  tags: dante

- name: Install Dante packages
  ansible.builtin.package:
    name: "{{ dante_package_names }}"
    state: present
  environment: "{{ proxy_env }}"
  become: true
  tags: dante

- name: Install SELinux tooling for Dante
  ansible.builtin.package:
    name: "{{ dante_selinux_packages }}"
    state: present
  when:
  - ansible_os_family == "RedHat"
  - dante_manage_selinux | bool
  - ansible_selinux is defined
  - ansible_selinux.status == "enabled"
  become: true
  tags: dante

- name: Ensure Dante group exists
  ansible.builtin.group:
    name: "{{ dante_group }}"
    system: true
    state: present
  become: true
  when: dante_group != "root"
  tags: dante

- name: Ensure Dante user exists
  ansible.builtin.user:
    name: "{{ dante_user }}"
    system: true
    shell: "{{ '/usr/sbin/nologin' if ansible_os_family == 'Debian' else '/sbin/nologin' }}"
    group: "{{ dante_group }}"
    create_home: false
    state: present
  become: true
  when: dante_user != "root"
  tags: dante

- name: Ensure Dante runtime directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ dante_user }}"
    group: "{{ dante_group }}"
    mode: "0755"
  loop:
  - "{{ dante_log_directory }}"
  - "{{ dante_pid_directory }}"
  become: true
  tags: dante

- name: Deploy Dante configuration
  ansible.builtin.template:
    src: sockd.conf.j2
    dest: "{{ dante_config_path }}"
    owner: root
    group: root
    mode: "0640"
    validate: "{{ dante_validate_binary }} -V -f %s"
  notify: Restart dante
  become: true
  tags: dante

- name: Open Dante port in UFW
  community.general.ufw:
    rule: allow
    port: "{{ dante_listen_port }}"
    proto: tcp
    comment: Dante SOCKS proxy
  when:
  - dante_manage_firewall | bool
  - ansible_os_family == "Debian"
  become: true
  tags: dante

- name: Open Dante port in firewalld
  ansible.posix.firewalld:
    port: "{{ dante_listen_port }}/tcp"
    zone: "{{ dante_firewall_zone }}"
    permanent: true
    immediate: true
    state: enabled
  when:
  - dante_manage_firewall | bool
  - ansible_os_family == "RedHat"
  become: true
  tags: dante

- name: Label Dante port for SELinux
  community.general.seport:
    ports: "{{ item.split('/')[0] }}"
    proto: "{{ item.split('/')[1] }}"
    setype: "{{ dante_selinux_port_type }}"
    state: present
  loop: "{{ dante_selinux_ports }}"
  when:
  - ansible_os_family == "RedHat"
  - dante_manage_selinux | bool
  - ansible_selinux is defined
  - ansible_selinux.status == "enabled"
  - dante_selinux_ports | length > 0
  become: true
  tags: dante

- name: Ensure Dante service state
  ansible.builtin.service:
    name: "{{ dante_service_name }}"
    enabled: "{{ dante_service_enabled }}"
    state: "{{ dante_service_state }}"
  when: dante_manage_service | bool
  become: true
  tags: dante
