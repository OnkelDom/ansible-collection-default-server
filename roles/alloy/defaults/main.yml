---
# Service-Konfiguration
alloy_manage_repository: true
alloy_manage_service: true
alloy_service_enabled: true
alloy_service_state: started
alloy_repository_url: "https://apt.grafana.com"
alloy_repository_key_url: "https://apt.grafana.com/gpg-full.key"
alloy_repository_keyring: "/etc/apt/keyrings/grafana.asc"

# Konfigurationsdatei-Pfad
alloy_config_file: /etc/alloy/config.alloy

# Benutzer und Gruppe (werden normalerweise automatisch beim Paket-Installation erstellt)
alloy_user: alloy
alloy_group: alloy

# Log-Level
alloy_log_level: info

# Optional helper variables for Loki targets
alloy_loki_endpoint: ""
alloy_normal_logs_tenant: "logs"
alloy_audit_logs_tenant: "audit"

# Default Alloy configuration. Keep the role baseline neutral and
# define environment-specific pipelines in inventory or playbooks.
alloy_config:
  logging:
    level: "{{ alloy_log_level }}"
    format: logfmt

# Firewall-Konfiguration (falls erforderlich)
alloy_manage_firewall: false
alloy_firewall_enabled: false
alloy_firewall_zone: public
alloy_manage_selinux: true
alloy_firewall_ports: []
alloy_selinux_ports: "{{ alloy_firewall_ports }}"

# Systemd-Service-Optionen
alloy_service_override: {}
  # Environment:
  #   - "CUSTOM_VAR=value"
  # ExecStartPre:
  #   - "/usr/bin/test -f /etc/alloy/config.alloy"
