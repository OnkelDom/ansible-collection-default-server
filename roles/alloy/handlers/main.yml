---
- name: restart alloy
  ansible.builtin.systemd:
    name: "{{ alloy_service_name }}"
    state: restarted
    daemon_reload: true
  become: true

- name: reload alloy
  ansible.builtin.systemd:
    name: "{{ alloy_service_name }}"
    state: reloaded
  become: true

- name: start alloy
  ansible.builtin.systemd:
    name: "{{ alloy_service_name }}"
    state: started
    enabled: "{{ alloy_service_enabled }}"
  become: true
