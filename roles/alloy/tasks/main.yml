---
- name: Validate supported platform
  ansible.builtin.assert:
    that:
    - ansible_os_family in ["Debian", "RedHat"]
    fail_msg: "The alloy role supports Debian and RedHat families only."
  tags:
  - alloy

- name: Include OS-specific variables
  ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"
  tags:
  - alloy
  - alloy-config

- name: Install SELinux tooling for alloy
  ansible.builtin.package:
    name: "{{ alloy_selinux_packages }}"
    state: present
  become: true
  when:
  - ansible_os_family == "RedHat"
  - alloy_manage_selinux | bool
  - ansible_selinux is defined
  - ansible_selinux.status == "enabled"
  tags:
  - alloy
  - alloy-firewall

- name: Install Grafana Alloy package
  ansible.builtin.package:
    name: "{{ alloy_package_name }}"
    state: present
  become: true
  notify: start alloy
  tags:
  - alloy
  - alloy-install

- name: Create alloy configuration directory
  ansible.builtin.file:
    path: "{{ alloy_config_dir }}"
    state: directory
    owner: "{{ alloy_user }}"
    group: "{{ alloy_group }}"
    mode: "0755"
  become: true
  tags:
  - alloy
  - alloy-config

- name: Create alloy data directory
  ansible.builtin.file:
    path: "{{ alloy_data_dir }}"
    state: directory
    owner: "{{ alloy_user }}"
    group: "{{ alloy_group }}"
    mode: "0755"
  become: true
  tags:
  - alloy
  - alloy-config

- name: Generate alloy configuration file
  ansible.builtin.template:
    src: config.alloy.j2
    dest: "{{ alloy_config_file }}"
    owner: "{{ alloy_user }}"
    group: "{{ alloy_group }}"
    mode: "0644"
    backup: true
  become: true
  notify: restart alloy
  tags:
  - alloy
  - alloy-config

- name: Create systemd service override directory
  ansible.builtin.file:
    path: /etc/systemd/system/{{ alloy_service_name }}.service.d
    state: directory
    mode: "0755"
  become: true
  when: alloy_service_override | length > 0
  tags:
  - alloy
  - alloy-service

- name: Create systemd service override file
  ansible.builtin.template:
    src: systemd-override.conf.j2
    dest: /etc/systemd/system/{{ alloy_service_name }}.service.d/override.conf
    mode: "0644"
  become: true
  when: alloy_service_override | length > 0
  notify:
  - restart alloy
  tags:
  - alloy
  - alloy-service

- name: Configure firewall for alloy
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
    zone: "{{ alloy_firewall_zone }}"
  loop: "{{ alloy_firewall_ports }}"
  become: true
  when:
  - alloy_manage_firewall | bool or alloy_firewall_enabled | bool
  - alloy_firewall_ports | length > 0
  - ansible_os_family == "RedHat"
  tags:
  - alloy
  - alloy-firewall

- name: Configure UFW for alloy
  community.general.ufw:
    rule: allow
    port: "{{ item.split('/')[0] }}"
    proto: "{{ item.split('/')[1] | default('tcp') }}"
  loop: "{{ alloy_firewall_ports }}"
  become: true
  when:
  - alloy_manage_firewall | bool or alloy_firewall_enabled | bool
  - alloy_firewall_ports | length > 0
  - ansible_os_family == "Debian"
  tags:
  - alloy
  - alloy-firewall

- name: Configure SELinux ports for alloy
  community.general.seport:
    ports: "{{ item.split('/')[0] }}"
    proto: "{{ item.split('/')[1] }}"
    setype: http_port_t
    state: present
  loop: "{{ alloy_selinux_ports }}"
  become: true
  when:
  - ansible_os_family == "RedHat"
  - alloy_manage_selinux | bool
  - ansible_selinux is defined
  - ansible_selinux.status == "enabled"
  - alloy_selinux_ports | length > 0
  tags:
  - alloy
  - alloy-firewall

- name: Start and enable alloy service
  ansible.builtin.systemd:
    name: "{{ alloy_service_name }}"
    state: "{{ alloy_service_state }}"
    enabled: "{{ alloy_service_enabled }}"
    daemon_reload: true
  become: true
  when: alloy_manage_service | bool
  tags:
  - alloy
  - alloy-service

- name: Verify alloy service status
  ansible.builtin.systemd:
    name: "{{ alloy_service_name }}"
  register: alloy_service_status
  become: true
  tags:
  - alloy
  - alloy-verify
