---
unbound_use_blocklist: false
unbound_blocklist_url: "https://raw.githubusercontent.com/StevenBlack/hosts/master/hosts"
unbound_manage_firewall: false
unbound_firewall_zone: public
unbound_zones_dir: /etc/unbound/zones.d
unbound_local_zones: []
unbound_auth_zones: []
unbound_config:
  server:
    verbosity: 1
    num-threads: "{{ ansible_processor_vcpus | default(ansible_processor_count | default(1)) }}"
    root-hints: /etc/unbound/root.hints
    tls-cert-bundle: /etc/ssl/certs/ca-certificates.crt
    log-queries: true
    port: 53
    prefetch: true
    hide-identity: true
    hide-version: true
    do-daemonize: true
    interface:
    - "0.0.0.0"
    - "::0"
    access-control:
    - "127.0.0.0/8 allow"
    - "::1/128 allow"
  remote-control:
    control-enable: false

