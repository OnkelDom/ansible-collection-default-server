---
- name: Gather operating system variables
  ansible.builtin.include_vars: "{{ item }}"
  with_first_found:
  - "{{ ansible_distribution | lower }}-{{ ansible_distribution_version | lower }}.yml"
  - "{{ ansible_distribution | lower }}-{{ ansible_distribution_major_version | lower }}.yml"
  - "{{ ansible_distribution_file_variety | lower }}-{{ ansible_distribution_major_version | lower }}.yml"
  - "{{ ansible_os_family | lower }}-{{ ansible_distribution_major_version | lower }}.yml"
  - "{{ ansible_distribution | lower }}.yml"
  - "{{ ansible_os_family | lower }}-{{ ansible_distribution_version.split('.')[0] }}.yml"
  - "{{ ansible_os_family | lower }}.yml"
  tags: keepalived

- name: Validate supported platform
  ansible.builtin.assert:
    that:
    - ansible_os_family in ["Debian", "RedHat"]
    fail_msg: "The keepalived role supports Debian and RedHat families only."
  tags: keepalived

- name: Combine keepalived config
  ansible.builtin.set_fact:
    keepalived_config: >-
      {{
        (keepalived_config_defaults | default({}))
        | combine(keepalived_config_group_vars | default({}), recursive=True, list_merge='append')
        | combine(keepalived_config_host_vars | default({}), recursive=True, list_merge='append')
        | combine(keepalived_config_playbook | default({}), recursive=True, list_merge='append')
      }}
  tags: keepalived

- name: Validate keepalived service settings
  ansible.builtin.assert:
    that:
    - keepalived_service_state in ["started", "stopped"]
    - not (keepalived_service_state == "started" and (keepalived_config.vrrp_instances | default([]) | length == 0))
    fail_msg: "keepalived_service_state=start requires at least one keepalived_config.vrrp_instances entry."
  tags: keepalived

- name: Install keepalived packages
  ansible.builtin.package:
    name: "{{ (keepalived_packages | default([])) + (keepalived_os_packages | default([])) }}"
    state: present
  become: true
  tags: keepalived

- name: Ensure keepalived script directory exists
  ansible.builtin.file:
    path: /etc/keepalived/scripts
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true
  tags: keepalived

- name: Configure keepalived
  ansible.builtin.template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
    owner: root
    group: root
    mode: "0644"
    validate: "{{ keepalived_binary }} -n -f %s -p /dev/null -r /dev/null"
  notify: Restart keepalived
  become: true
  tags: keepalived

- name: Deploy SNAT enable script
  ansible.builtin.template:
    src: snat_enable.sh.j2
    dest: /etc/keepalived/scripts/snat_enable.sh
    owner: root
    group: root
    mode: "0755"
  when: keepalived_config.snat_scripts | default(false) | bool
  notify: Restart keepalived
  become: true
  tags: keepalived

- name: Deploy SNAT disable script
  ansible.builtin.template:
    src: snat_disable.sh.j2
    dest: /etc/keepalived/scripts/snat_disable.sh
    owner: root
    group: root
    mode: "0755"
  when: keepalived_config.snat_scripts | default(false) | bool
  notify: Restart keepalived
  become: true
  tags: keepalived

- name: Configure logrotate for custom keepalived logs
  ansible.builtin.template:
    src: keepalived_logrotate.j2
    dest: "{{ keepalived_logrotate_path }}"
    owner: root
    group: root
    mode: "0644"
  when:
  - keepalived_logrotate_enabled | bool
  - keepalived_config.snat_scripts | default(false) | bool or keepalived_config.snat_logfile is defined
  become: true
  tags: keepalived

- name: Ensure keepalived service is enabled and started
  ansible.builtin.service:
    name: "{{ keepalived_service }}"
    enabled: "{{ keepalived_service_enabled }}"
    state: "{{ keepalived_service_state }}"
  become: true
  when: keepalived_manage_service | bool
  tags: keepalived

- name: Flush handlers
  ansible.builtin.meta: flush_handlers
  tags: keepalived
